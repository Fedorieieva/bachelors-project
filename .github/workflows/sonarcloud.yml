name: SonarCloud analysis

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  pull-requests: read

jobs:
  Analysis:
    runs-on: ubuntu-latest

    steps:
      # 1. Завантажуємо код (КРИТИЧНО ВАЖЛИВИЙ КРОК)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Обов'язково для SonarCloud, щоб він бачив історію комітів

      # 2. Запускаємо аналіз
      - name: Analyze with SonarCloud
        uses: SonarSource/sonarcloud-github-action@4006f663ecaf1f8093e8e4abb9227f6041f52216
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=Fedorieieva_bachelors-project
            -Dsonar.organization=fedorieieva
            -Dsonar.sources=riddle-generator/client/src,riddle-generator/server/src
            -Dsonar.exclusions=**/node_modules/**,**/.next/**,**/dist/**,**/build/**,**/*.spec.ts,**/*.test.ts
          projectBaseDir: .
